name: setup-and-install-dep
description: Setup uv and install the project dependencies (including dev extras).
inputs:
  additional-dependencies:
    description: 'Additional dependencies to install via uv pip install (optional)'
    required: false
    default: ''

outputs:
  python-version:
    description: 'The Python version read from Dockerfile (major.minor.patch, e.g. 3.10.20)'
    value: ${{ steps.read-python-version.outputs.value }}

runs:
  using: composite
  steps:
    - name: Read Python version from Dockerfile
      id: read-python-version
      shell: bash
      run: |
        version=$(sed -n 's/^ARG PYTHON_VERSION=\([0-9]*\.[0-9]*\.[0-9]*\)/\1/p' Dockerfile)
        echo "value=${version}" >> $GITHUB_OUTPUT

    - name: Set up uv
      id: setup-uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        save-cache: ${{ github.event_name != 'pull_request' }}
        python-version: ${{ steps.read-python-version.outputs.value }}

    - name: Install dependencies
      shell: bash
      run: |
        uv sync --frozen --extra dev
        # jwt 1.4.0 (python-jwt) and pyjwt both install to the jwt/ namespace.
        # nuxeo[oauth2] needs jwt 1.4.0's JWT/jwk_from_dict; force it to win.
        uv pip install "jwt==1.4.0" --force-reinstall
        if [ -n "${{ inputs.additional-dependencies }}" ]; then
          uv pip install ${{ inputs.additional-dependencies }}
        fi
