name: Build and Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
    
    - uses: ./.github/actions/setup-and-install-dep
        
    - name: Build
      run: |
        uv build
        
    - name: Run unit tests
      run: |
        uv run pytest tests/ -v --no-integration
