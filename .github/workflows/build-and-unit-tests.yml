name: Build and Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    
    - uses: ./.github/actions/setup-and-install-dep
        
    - name: Build
      run: |
        uv build
        
    - name: Run unit tests
      run: |
        uv run pytest tests/ -v --no-integration
