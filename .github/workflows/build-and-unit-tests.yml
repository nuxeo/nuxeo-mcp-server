name: Build and Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    
    - uses: ./.github/actions/setup-and-install-dep
        
    - name: Build
      run: |
        uv build
        
    - name: Run unit tests
      run: |
        uv run pytest tests/ -v --no-integration
